<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book a Consultation | We Care Sudbury</title>
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@300;400;600&display=swap)" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="contact-strip">
    📞 (705) 555‑1234 | ✉️ info@wecaresudbury.ca | Serving Greater Sudbury
  </header>

  <section class="container" style="padding:80px 20px; max-width:700px;">
    <h1>Book a Free Consultation</h1>
    <p>Our doctor-led care team will review your family’s needs and provide a personalized home support plan.</p>

    <form action="#" method="POST" style="display:grid; gap:20px; margin-top:40px;">
      <input type="text" name="name" placeholder="Full Name" required style="padding:12px;">
      <input type="email" name="email" placeholder="Email" required style="padding:12px;">
      <input type="tel" name="phone" placeholder="Phone" required style="padding:12px;">
      <textarea name="message" placeholder="Tell us about your situation…" rows="5" style="padding:12px;"></textarea>
      <button class="btn btn-primary" type="submit">Submit Request</button>
    </form>
  </section>

  <footer>
    © We Care Sudbury — Senior Support Services
  </footer>
</body>
</html>
